<!DOCTYPE html>

<meta charset="UTF-8">

<title>Joel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Mono', monospace;
    background: #0a0a0a;
    color: #f0f0f0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .terminal {
    width: 520px;
    background: #111;
    border-radius: 12px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  .bar {
    background: #1e1e1e;
    padding: 0.9rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .d1 { background: #ff5f57; }
  .d2 { background: #febc2e; }
  .d3 { background: #28c840; }
  .bar-title { flex: 1; text-align: center; font-size: 0.72rem; color: #555; }

  .body { padding: 2rem; min-height: 260px; }

  .line {
    font-size: 0.88rem;
    line-height: 2;
    opacity: 0;
    animation: appear 0.01s forwards;
  }
  .cmd    { color: #28c840; }
  .out    { color: #f0f0f0; }
  .dim    { color: #444; }
  .accent { color: #febc2e; }

  .big {
    font-size: 2.2rem;
    font-weight: 700;
    color: #f0f0f0;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin: 0.4rem 0;
    opacity: 0;
    animation: appear 0.01s forwards;
  }

  @keyframes appear { to { opacity: 1; } }

  .cursor::after {
    content: '\2588';
    color: #28c840;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .l1  { animation-delay: 0.4s; }
  .l2  { animation-delay: 1.0s; }
  .l3  { animation-delay: 1.6s; }
  .l4  { animation-delay: 2.1s; }
  .l5  { animation-delay: 2.7s; }
  .l6  { animation-delay: 3.2s; }
  .l7  { animation-delay: 3.8s; }
  .l8  { animation-delay: 4.4s; }
  .l9  { animation-delay: 5.0s; }
  .l10 { animation-delay: 5.5s; }
</style>
</head>
<body>
